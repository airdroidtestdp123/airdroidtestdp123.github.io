<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LVB Scoreboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --lvb-blue: #0a4a6e;
      --lvb-blue-top: #17628a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse at top, #1e3a5f 0%, transparent 55%),
        var(--bg);
      padding: 2rem 1.25rem 3rem;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .brand-mark {
      display: inline-block;
      margin: 0 auto 0.85rem;
      padding: 0.55rem 1.6rem 0.45rem;
      font-size: clamp(2.8rem, 8vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 0.12em;
      line-height: 1;
      color: #ffffff;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, var(--lvb-blue-top) 0%, transparent 55%),
        var(--lvb-blue);
      border-radius: 2px;
    }

    .brand-sub {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .refresh-btn {
      appearance: none;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: var(--panel);
      color: var(--text);
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .refresh-btn svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .refresh-btn:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .refresh-btn.is-loading svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #scoreboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 14px;
      padding: 1.25rem 1.35rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    .team {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 0.85rem;
      color: var(--accent);
    }

    .stat {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.4rem 0;
      color: var(--muted);
      border-top: 1px solid rgba(148, 163, 184, 0.15);
    }

    .stat:first-of-type { border-top: none; }

    .value {
      color: var(--text);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand-mark">LVB</div>
      <p class="brand-sub">Scoreboard</p>
      <button type="button" class="refresh-btn" id="refreshBtn" aria-label="Refresh" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.6-6.4" />
          <polyline points="21 3 21 9 15 9" />
        </svg>
      </button>
    </header>

    <div id="scoreboard" aria-live="polite"></div>
  </div>

  <script>
    const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOcaFZv-1fupAcEYjXFCUUMQCr4rsMGWvWqAkKP2U_oQOQ9cT59_WbfKf55huSp1U1s6S3kebVe2i4/pub?output=csv";

    const boardEl = document.getElementById("scoreboard");
    const refreshBtn = document.getElementById("refreshBtn");

    function splitCsvLine(line) {
      return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map((cell) =>
        cell.trim().replace(/^"|"$/g, "").replace(/""/g, '"')
      );
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseCsv(csv) {
      const lines = csv.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const cols = splitCsvLine(line);
        const [team, visitors, inductions] = cols;
        if (!team) continue;

        rows.push({
          team,
          visitors: visitors || "0",
          inductions: inductions || "0",
        });
      }

      return rows;
    }

    function renderRows(rows) {
      if (!rows.length) {
        boardEl.innerHTML = '<div class="empty">No teams yet</div>';
        return;
      }

      boardEl.innerHTML = rows
        .map(
          ({ team, visitors, inductions }) => `
        <div class="card">
          <div class="team">${escapeHtml(team)}</div>
          <div class="stat">Visitors <span class="value">${escapeHtml(visitors)}</span></div>
          <div class="stat">Inductions <span class="value">${escapeHtml(inductions)}</span></div>
        </div>`
        )
        .join("");
    }

    async function loadData() {
      refreshBtn.disabled = true;
      refreshBtn.classList.add("is-loading");

      try {
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const csv = await res.text();
        renderRows(parseCsv(csv));
      } catch (err) {
        console.error(err);
        boardEl.innerHTML = '<div class="empty">Unable to load scores</div>';
      } finally {
        refreshBtn.disabled = false;
        refreshBtn.classList.remove("is-loading");
      }
    }

    refreshBtn.addEventListener("click", loadData);
    loadData();
  </script>
</body>
</html>
