<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LVB Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --lvb-blue: #0a4a6e;
      --lvb-blue-top: #17628a;
      --deep: #062636;
      --foam: #f5f9fc;
      --ink: #0c2b3d;
      --muted: #5d7a8c;
      --line: rgba(10, 74, 110, 0.14);
      --glow: rgba(23, 98, 138, 0.28);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Manrope", sans-serif;
      color: var(--ink);
      background: var(--foam);
      overflow-x: hidden;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      padding: clamp(1.5rem, 4vw, 3.25rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(23, 98, 138, 0.28), transparent 58%),
        radial-gradient(ellipse 40% 35% at 0% 100%, rgba(10, 74, 110, 0.12), transparent 50%),
        radial-gradient(ellipse 35% 30% at 100% 80%, rgba(23, 98, 138, 0.1), transparent 48%),
        linear-gradient(180deg, #ffffff 0%, #eef5f9 42%, #e4eef5 100%);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(10, 74, 110, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10, 74, 110, 0.045) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(ellipse at center, black 25%, transparent 78%);
      pointer-events: none;
      animation: gridDrift 30s linear infinite;
    }

    @keyframes gridDrift {
      from { background-position: 0 0, 0 0; }
      to { background-position: 56px 56px, 56px 56px; }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      animation: floatOrb 14s ease-in-out infinite;
    }

    .orb-a {
      width: 38vmin;
      height: 38vmin;
      top: 6%;
      left: 8%;
      background: rgba(23, 98, 138, 0.35);
    }

    .orb-b {
      width: 32vmin;
      height: 32vmin;
      right: 6%;
      bottom: 8%;
      background: rgba(10, 74, 110, 0.22);
      animation-delay: -5s;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(3%, -5%) scale(1.07); }
    }

    .brand {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: clamp(1.75rem, 4vw, 3rem);
      animation: riseIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand-mark {
      display: inline-block;
      padding: 0.85rem 2.4rem 0.7rem;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(5.5rem, 18vw, 10rem);
      letter-spacing: 0.14em;
      line-height: 0.9;
      color: #ffffff;
      background:
        radial-gradient(ellipse 130% 90% at 50% -30%, var(--lvb-blue-top) 0%, transparent 58%),
        var(--lvb-blue);
      box-shadow:
        0 18px 40px rgba(6, 38, 54, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      border-radius: 3px;
    }

    .brand-sub {
      margin: 0.9rem 0 1.35rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--lvb-blue);
    }

    .refresh-wrap {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
    }

    .refresh-hint {
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--deep);
      letter-spacing: 0.02em;
    }

    .refresh-hint span {
      color: var(--lvb-blue);
    }

    .refresh-btn {
      appearance: none;
      border: 2px solid rgba(10, 74, 110, 0.28);
      background: #ffffff;
      color: var(--lvb-blue);
      min-width: 168px;
      height: 52px;
      padding: 0 1.1rem;
      border-radius: 999px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      font-family: "Manrope", sans-serif;
      font-size: 0.92rem;
      font-weight: 800;
      box-shadow: 0 12px 28px rgba(6, 38, 54, 0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      animation: pulseHint 2.2s ease-in-out infinite;
    }

    .refresh-btn svg {
      width: 22px;
      height: 22px;
      display: block;
      flex-shrink: 0;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(10, 74, 110, 0.5);
      box-shadow: 0 16px 34px rgba(6, 38, 54, 0.16);
      animation: none;
    }

    .refresh-btn:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
      animation: none;
    }

    .refresh-btn.is-loading svg {
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulseHint {
      0%, 100% {
        box-shadow: 0 12px 28px rgba(6, 38, 54, 0.12), 0 0 0 0 rgba(23, 98, 138, 0.35);
      }
      50% {
        box-shadow: 0 12px 28px rgba(6, 38, 54, 0.12), 0 0 0 10px rgba(23, 98, 138, 0);
      }
    }

    #scoreboard {
      position: relative;
      z-index: 1;
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: clamp(1rem, 2.5vw, 1.6rem);
    }

    .card {
      position: relative;
      padding: 1.7rem 1.55rem 1.45rem;
      background: linear-gradient(165deg, #ffffff 0%, #f7fbfe 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(6, 38, 54, 0.08);
      overflow: hidden;
      animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 28px 55px rgba(6, 38, 54, 0.14);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, var(--deep), var(--lvb-blue), var(--lvb-blue-top));
    }

    .card::after {
      content: "";
      position: absolute;
      right: -18%;
      bottom: -35%;
      width: 55%;
      height: 70%;
      background: radial-gradient(circle, var(--glow), transparent 70%);
      pointer-events: none;
    }

    .rank {
      position: absolute;
      top: 1rem;
      right: 1.15rem;
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.5rem;
      line-height: 1;
      color: rgba(10, 74, 110, 0.08);
      letter-spacing: 0.04em;
    }

    .team {
      position: relative;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.1rem, 5vw, 2.8rem);
      letter-spacing: 0.06em;
      color: var(--deep);
      margin-bottom: 1.25rem;
    }

    .stats {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .stat {
      padding: 0.95rem 0.9rem;
      background: rgba(10, 74, 110, 0.05);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .stat-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .value {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.2rem, 6vw, 3rem);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--lvb-blue);
      font-variant-numeric: tabular-nums;
    }

    .stat:nth-child(2) .value {
      color: var(--deep);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(26px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <header class="brand">
      <div class="brand-mark">LVB</div>
      <p class="brand-sub">Scoreboard</p>
      <div class="refresh-wrap">
        <p class="refresh-hint">Press <span>Refresh</span> for the latest scores</p>
        <button type="button" class="refresh-btn" id="refreshBtn" aria-label="Refresh scores" title="Refresh scores">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12a9 9 0 1 1-2.6-6.4" />
            <polyline points="21 3 21 9 15 9" />
          </svg>
          Refresh
        </button>
      </div>
    </header>

    <div id="scoreboard" aria-live="polite"></div>
  </div>

  <script>
    const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOcaFZv-1fupAcEYjXFCUUMQCr4rsMGWvWqAkKP2U_oQOQ9cT59_WbfKf55huSp1U1s6S3kebVe2i4/pub?output=csv";

    const boardEl = document.getElementById("scoreboard");
    const refreshBtn = document.getElementById("refreshBtn");

    let activeRequest = 0;
    let abortController = null;

    function splitCsvLine(line) {
      return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map((cell) =>
        cell.trim().replace(/^"|"$/g, "").replace(/""/g, '"')
      );
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseCsv(csv) {
      const lines = csv.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const cols = splitCsvLine(line);
        const [team, visitors, inductions] = cols;
        if (!team) continue;

        rows.push({
          team,
          visitors: visitors || "0",
          inductions: inductions || "0",
        });
      }

      return rows;
    }

    function renderRows(rows) {
      if (!rows.length) {
        boardEl.innerHTML = '<div class="empty">No teams yet</div>';
        return;
      }

      boardEl.innerHTML = rows
        .map(
          ({ team, visitors, inductions }, index) => `
        <article class="card">
          <span class="rank">0${index + 1}</span>
          <h2 class="team">${escapeHtml(team)}</h2>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">Visitors</span>
              <span class="value">${escapeHtml(visitors)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Inductions</span>
              <span class="value">${escapeHtml(inductions)}</span>
            </div>
          </div>
        </article>`
        )
        .join("");
    }

    function sheetUrl() {
      // Bust browser/CDN cache so each Refresh gets the latest published CSV
      const sep = API_URL.includes("?") ? "&" : "?";
      return `${API_URL}${sep}cb=${Date.now()}-${Math.random().toString(36).slice(2)}`;
    }

    async function loadData() {
      if (abortController) abortController.abort();
      abortController = new AbortController();

      const requestId = ++activeRequest;
      refreshBtn.disabled = true;
      refreshBtn.classList.add("is-loading");

      try {
        const res = await fetch(sheetUrl(), {
          cache: "no-store",
          signal: abortController.signal,
          headers: {
            "Cache-Control": "no-cache",
            Pragma: "no-cache",
          },
        });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const csv = await res.text();
        if (requestId !== activeRequest) return; // ignore outdated response
        renderRows(parseCsv(csv));
      } catch (err) {
        if (err.name === "AbortError") return;
        console.error(err);
        if (requestId !== activeRequest) return;
        boardEl.innerHTML = '<div class="empty">Unable to load scores</div>';
      } finally {
        if (requestId === activeRequest) {
          refreshBtn.disabled = false;
          refreshBtn.classList.remove("is-loading");
        }
      }
    }

    refreshBtn.addEventListener("click", loadData);
    loadData();
  </script>
</body>
</html>
