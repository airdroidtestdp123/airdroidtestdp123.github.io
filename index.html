<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LVB Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Figtree:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0b2a6f;
      --blue: #1a56db;
      --blue-bright: #3b82f6;
      --blue-soft: #60a5fa;
      --ice: #e8f1ff;
      --white: #ffffff;
      --ink: #0f274f;
      --muted: #5b7399;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Figtree", sans-serif;
      color: var(--ink);
      background: var(--white);
      overflow-x: hidden;
    }

    .stage {
      position: relative;
      min-height: 100vh;
      padding: clamp(1.5rem, 4vw, 3rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 70% 50% at 50% -5%, rgba(59, 130, 246, 0.22), transparent 55%),
        radial-gradient(ellipse 45% 35% at 100% 100%, rgba(11, 42, 111, 0.1), transparent 50%),
        radial-gradient(ellipse 40% 30% at 0% 90%, rgba(96, 165, 250, 0.16), transparent 45%),
        linear-gradient(180deg, #ffffff 0%, #f3f7ff 48%, #eaf1ff 100%);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(26, 86, 219, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26, 86, 219, 0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
      pointer-events: none;
      animation: gridDrift 28s linear infinite;
    }

    @keyframes gridDrift {
      from { background-position: 0 0, 0 0; }
      to { background-position: 48px 48px, 48px 48px; }
    }

    .glow {
      position: absolute;
      width: 42vmin;
      height: 42vmin;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.28;
      pointer-events: none;
      animation: floatGlow 12s ease-in-out infinite;
    }

    .glow-a {
      top: 8%;
      left: 12%;
      background: var(--blue-bright);
    }

    .glow-b {
      bottom: 10%;
      right: 8%;
      background: var(--navy);
      animation-delay: -4s;
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(4%, -6%) scale(1.08); }
    }

    .brand {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: clamp(2rem, 5vw, 3.5rem);
      animation: riseIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .brand-mark {
      display: inline-block;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(4.5rem, 14vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #ffffff 0%, #dbeafe 28%, var(--blue-soft) 55%, var(--blue) 78%, var(--navy) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 8px 24px rgba(26, 86, 219, 0.28));
    }

    .brand-sub {
      margin-top: 0.35rem;
      font-size: clamp(0.85rem, 2vw, 1.05rem);
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--blue);
    }

    #scoreboard {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: clamp(1rem, 3vw, 1.75rem);
    }

    .panel {
      position: relative;
      padding: 1.75rem 1.6rem 1.5rem;
      border-radius: 4px;
      background: linear-gradient(160deg, #ffffff 0%, #f7faff 100%);
      border: 1px solid rgba(26, 86, 219, 0.14);
      box-shadow: 0 18px 40px rgba(11, 42, 111, 0.08);
      overflow: hidden;
      animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
    }

    .panel:nth-child(1) { animation-delay: 0.12s; }
    .panel:nth-child(2) { animation-delay: 0.22s; }
    .panel:nth-child(3) { animation-delay: 0.32s; }
    .panel:nth-child(4) { animation-delay: 0.42s; }

    .panel:hover {
      transform: translateY(-4px);
      border-color: rgba(26, 86, 219, 0.4);
      box-shadow: 0 22px 48px rgba(11, 42, 111, 0.14);
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--navy), var(--blue), var(--blue-soft), #ffffff);
    }

    .panel::after {
      content: "";
      position: absolute;
      inset: auto -20% -40% auto;
      width: 55%;
      height: 70%;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.16), transparent 70%);
      pointer-events: none;
    }

    .rank {
      position: absolute;
      top: 1rem;
      right: 1.1rem;
      font-family: "Bebas Neue", sans-serif;
      font-size: 2.4rem;
      line-height: 1;
      color: rgba(26, 86, 219, 0.1);
      letter-spacing: 0.04em;
    }

    .team {
      position: relative;
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2rem, 5vw, 2.75rem);
      letter-spacing: 0.06em;
      color: var(--navy);
      margin-bottom: 1.35rem;
    }

    .stats {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.85rem;
    }

    .stat {
      padding: 0.9rem 0.85rem;
      background: var(--ice);
      border: 1px solid rgba(26, 86, 219, 0.1);
      border-radius: 2px;
    }

    .stat-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-family: "Bebas Neue", sans-serif;
      font-size: clamp(2.2rem, 6vw, 3rem);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--blue);
      font-variant-numeric: tabular-nums;
    }

    .stat:nth-child(2) .stat-value {
      color: var(--navy);
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(28px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 520px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="glow glow-a" aria-hidden="true"></div>
    <div class="glow glow-b" aria-hidden="true"></div>

    <header class="brand">
      <div class="brand-mark">LVB</div>
      <p class="brand-sub">Scoreboard</p>
    </header>

    <div id="scoreboard" aria-live="polite"></div>
  </div>

  <script>
    const API_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSOcaFZv-1fupAcEYjXFCUUMQCr4rsMGWvWqAkKP2U_oQOQ9cT59_WbfKf55huSp1U1s6S3kebVe2i4/pub?output=csv";
    const FALLBACK_URL = "sample.csv";
    const REFRESH_MS = 10000;

    const boardEl = document.getElementById("scoreboard");

    function splitCsvLine(line) {
      return line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map((cell) =>
        cell.trim().replace(/^"|"$/g, "").replace(/""/g, '"')
      );
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function parseCsv(csv) {
      const lines = csv.replace(/\r\n/g, "\n").replace(/\r/g, "\n").split("\n");
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;

        const cols = splitCsvLine(line);
        const [team, visitors, inductions] = cols;
        if (!team) continue;

        rows.push({
          team,
          visitors: visitors || "0",
          inductions: inductions || "0",
        });
      }

      return rows;
    }

    function renderRows(rows) {
      if (!rows.length) {
        boardEl.innerHTML = '<div class="empty">No teams yet</div>';
        return;
      }

      boardEl.innerHTML = rows
        .map(
          ({ team, visitors, inductions }, index) => `
        <article class="panel">
          <span class="rank">0${index + 1}</span>
          <h2 class="team">${escapeHtml(team)}</h2>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">Visitors</span>
              <span class="stat-value">${escapeHtml(visitors)}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Inductions</span>
              <span class="stat-value">${escapeHtml(inductions)}</span>
            </div>
          </div>
        </article>`
        )
        .join("");
    }

    async function loadData() {
      const usePublished = API_URL && API_URL !== "PASTE_CSV_URL";
      const url = usePublished ? API_URL : FALLBACK_URL;

      try {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const csv = await res.text();
        renderRows(parseCsv(csv));
      } catch (err) {
        console.error(err);
        boardEl.innerHTML = '<div class="empty">Unable to load scores</div>';
      }
    }

    loadData();
    setInterval(loadData, REFRESH_MS);
  </script>
</body>
</html>
